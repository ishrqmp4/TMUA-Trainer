<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMUA Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #1a1a1f; --surface2: #222228;
    --border: #2e2e38; --text: #f0f0f0; --muted: #888; --hint: #555;
    --blue: #4f8ef7; --green: #3ecf7a; --amber: #f5a623; --red: #e84c4c;
    --radius: 10px; --radius-lg: 16px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 520px; margin-bottom: 1rem; }
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .mode-tab { flex: 1; padding: 9px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .mode-tab.active { background: var(--surface2); color: var(--text); border-color: #444; font-weight: 500; }
  .diff-row { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .diff-btn { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .diff-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(79,142,247,0.08); font-weight: 500; }
  .session-timer-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .session-timer-label { font-size: 12px; color: var(--muted); }
  .session-timer-value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .session-timer-value.warning { color: var(--amber); }
  .session-timer-value.danger { color: var(--red); }
  .timer-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .timer-bar { height: 100%; border-radius: 2px; transition: width 0.1s linear, background 0.3s; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface2); border-radius: var(--radius); padding: 10px 8px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .question-area { background: var(--surface2); border-radius: var(--radius-lg); padding: 2rem 1.5rem; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 1rem; border: 1px solid var(--border); }
  .question-text { font-size: 20px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.45; margin-bottom: 6px; }
  .question-sub { font-size: 12px; color: var(--hint); text-align: center; margin-top: 4px; }
  .answer-input { width: 100%; font-size: 24px; text-align: center; padding: 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: inherit; margin-bottom: 0.75rem; outline: none; transition: border-color 0.15s; }
  .answer-input:focus { border-color: var(--blue); }
  .answer-input:disabled { opacity: 0.4; }
  .answer-input.correct { border-color: var(--green); background: rgba(62,207,122,0.06); }
  .answer-input.wrong { border-color: var(--red); background: rgba(232,76,76,0.06); }
  .solution-panel { background: var(--surface2); border: 1px solid var(--red); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; display: none; }
  .solution-panel.visible { display: block; }
  .solution-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .solution-steps { list-style: none; }
  .solution-steps li { font-size: 14px; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); line-height: 1.5; }
  .solution-steps li:last-child { border-bottom: none; }
  .solution-steps li span { color: var(--muted); font-size: 12px; margin-right: 8px; }
  .solution-answer { font-size: 15px; font-weight: 600; color: var(--green); margin-top: 0.75rem; }
  .feedback { text-align: center; font-size: 14px; min-height: 20px; margin-bottom: 1rem; font-weight: 500; }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }
  .controls-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: var(--surface2); color: var(--text); border-color: #444; }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 500; }
  .btn-primary:hover { background: #3a7de0; border-color: #3a7de0; color: #fff; }
  .btn-next { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 600; display: none; }
  .btn-next:hover { background: #e09520; border-color: #e09520; color: #000; }
  .btn-next.visible { display: flex; align-items: center; justify-content: center; }
  .end-screen { text-align: center; padding: 1rem 0; display: none; }
  .end-screen.visible { display: block; }
  .end-score { font-size: 56px; font-weight: 700; color: var(--blue); }
  .end-label { font-size: 14px; color: var(--muted); margin-bottom: 0.5rem; }
  .end-detail { font-size: 13px; color: var(--hint); margin-bottom: 1.5rem; }
  .topic-badge { display: inline-block; font-size: 10px; color: var(--blue); background: rgba(79,142,247,0.12); border: 1px solid rgba(79,142,247,0.2); border-radius: 6px; padding: 2px 8px; margin-top: 8px; letter-spacing: 0.4px; text-transform: uppercase; }
  .answer-toggle { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .answer-toggle button { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .answer-toggle button.active { border-color: var(--blue); color: var(--blue); background: rgba(79,142,247,0.08); font-weight: 500; }
  .choices { display: none; flex-direction: column; gap: 8px; margin-bottom: 0.75rem; }
  .choice { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-size: 17px; font-family: inherit; cursor: pointer; text-align: left; transition: border-color 0.12s, background 0.12s; }
  .choice:hover:not(:disabled) { border-color: #555; }
  .choice:disabled { cursor: default; }
  .choice .key { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 6px; background: var(--bg); color: var(--muted); font-size: 12px; font-weight: 600; flex: 0 0 auto; }
  .choice.correct { border-color: var(--green); background: rgba(62,207,122,0.12); color: var(--green); }
  .choice.correct .key { background: rgba(62,207,122,0.2); color: var(--green); }
  .choice.wrong { border-color: var(--red); background: rgba(232,76,76,0.12); color: var(--red); }
  .choice.wrong .key { background: rgba(232,76,76,0.2); color: var(--red); }
  .save-row { display: flex; gap: 8px; max-width: 320px; margin: 0 auto 1.25rem; }
  .save-row input { flex: 1; font-size: 14px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: inherit; outline: none; text-align: center; }
  .save-row input:focus { border-color: var(--blue); }
  .save-row .btn { flex: 0 0 auto; max-width: 120px; }
  .lb-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .lb-title { font-size: 13px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; }
  .lb-filter { font-size: 11px; color: var(--muted); }
  .lb-list { list-style: none; }
  .lb-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 10px; padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .lb-row:last-child { border-bottom: none; }
  .lb-row.you { background: rgba(79,142,247,0.08); border-radius: 6px; }
  .lb-rank { font-variant-numeric: tabular-nums; color: var(--muted); font-weight: 600; text-align: center; }
  .lb-row.top1 .lb-rank { color: #f5c518; }
  .lb-row.top2 .lb-rank { color: #c0c8d0; }
  .lb-row.top3 .lb-rank { color: #cd7f32; }
  .lb-name { color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-name small { color: var(--hint); font-size: 11px; font-weight: 400; margin-left: 6px; }
  .lb-score { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--blue); }
  .lb-empty { text-align: center; color: var(--hint); font-size: 13px; padding: 1.5rem 0; }
  .lb-clear { font-size: 11px; color: var(--hint); background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline; }
  .lb-clear:hover { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>TMUA Trainer</h1>
  <p>120 seconds — answer as many as you can</p>
</header>
<div class="card">
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('arithmetic')">Arithmetic</button>
    <button class="mode-tab" onclick="setMode('tmua')">TMUA / ESAT</button>
  </div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn" onclick="setDiff('hard')">Hard</button>
  </div>
  <div class="answer-toggle">
    <button class="active" onclick="setAnswerStyle('choice')">Multiple choice</button>
    <button onclick="setAnswerStyle('type')">Type answer</button>
  </div>
  <div class="session-timer-wrap">
    <span class="session-timer-label">Time remaining</span>
    <span class="session-timer-value" id="session-timer">2:00</span>
  </div>
  <div class="timer-wrap"><div class="timer-bar" id="timer-bar" style="width:100%;background:var(--blue)"></div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streak">0</div></div>
    <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="best">0</div></div>
  </div>
  <div id="main-area">
    <div class="question-area">
      <div class="question-text" id="question-text">Press start</div>
      <div class="question-sub" id="question-sub">Choose a mode and difficulty above</div>
      <div class="topic-badge" id="topic-badge" style="display:none"></div>
    </div>
    <div class="choices" id="choices"></div>
    <input class="answer-input" type="text" inputmode="text" autocomplete="off" id="answer-input" placeholder="Answer — e.g. 12, 0.5 or 1/2" oninput="handleInput()" disabled />
    <div class="feedback" id="feedback"></div>
    <div class="solution-panel" id="solution-panel">
      <div class="solution-title">Solution</div>
      <ul class="solution-steps" id="solution-steps"></ul>
      <div class="solution-answer" id="solution-answer"></div>
    </div>
    <div class="controls-row">
      <button class="btn btn-primary" onclick="startSession()" id="start-btn">Start</button>
      <button class="btn btn-next" id="next-btn" onclick="resumeSession()">Next →</button>
      <button class="btn" onclick="resetSession()">Reset</button>
    </div>
  </div>
  <div class="end-screen" id="end-screen">
    <div class="end-score" id="end-score">0</div>
    <div class="end-label">correct in 120 seconds</div>
    <div class="end-detail" id="end-detail"></div>
    <div class="save-row" id="save-row">
      <input type="text" id="name-input" maxlength="14" placeholder="Your name" />
      <button class="btn btn-primary" id="save-btn" onclick="saveScore()">Save</button>
    </div>
    <div class="controls-row" style="justify-content:center">
      <button class="btn btn-primary" onclick="resetSession()" style="max-width:160px">Play again</button>
    </div>
  </div>
</div>
<div class="card">
  <div class="lb-head">
    <span class="lb-title">Leaderboard</span>
    <span class="lb-filter" id="lb-filter"></span>
  </div>
  <ul class="lb-list" id="lb-list"></ul>
  <div style="text-align:center;margin-top:1rem">
    <button class="lb-clear" id="lb-clear" onclick="clearLeaderboard()">Clear leaderboard</button>
  </div>
</div>
<script>
let mode='arithmetic', diff='easy';
let score=0, streak=0, best=0, totalAttempted=0;
let currentQ=null, sessionInterval=null;
let seenQuestions=new Set(); // questions shown this session — cleared each new session
let answerStyle='choice', currentChoices=[];
let sessionTimeLeft=120, sessionActive=false, accepting=false, paused=false;

function setMode(m){mode=m;document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='arithmetic')||(i===1&&m==='tmua')));resetSession();renderLeaderboard();}
function setDiff(d){diff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===d));renderLeaderboard();if(sessionActive&&!paused)nextQuestion();}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}
function nCr(n,r){if(r>n||r<0)return 0;if(r===0||r===n)return 1;r=Math.min(r,n-r);let v=1;for(let i=0;i<r;i++){v*=(n-i);v/=(i+1);}return Math.round(v);}
function sign(x){return x>=0?'+':'-';}
function abs(x){return Math.abs(x);}

// ── ARITHMETIC ───────────────────────────────────────────────────────────
function generateArithmetic(){
  let q,a,steps;
  if(diff==='easy'){
    const t=rand(0,3);
    if(t===0){let x=rand(2,50),y=rand(2,50);q=`${x} + ${y}`;a=x+y;steps=[`${x} + ${y} = ${a}`];}
    else if(t===1){let x=rand(10,99),y=rand(1,x);q=`${x} − ${y}`;a=x-y;steps=[`${x} − ${y} = ${a}`];}
    else if(t===2){let x=rand(2,12),y=rand(2,12);q=`${x} × ${y}`;a=x*y;steps=[`${x} × ${y} = ${a}`];}
    else{let y=rand(2,12),x=y*rand(2,12);q=`${x} ÷ ${y}`;a=x/y;steps=[`${x} ÷ ${y} = ${a}`];}
  } else if(diff==='medium'){
    const t=rand(0,3);
    if(t===0){let x=rand(50,500),y=rand(50,500);q=`${x} + ${y}`;a=x+y;steps=[`Hundreds: ${Math.floor(x/100)*100}+${Math.floor(y/100)*100}`,`Tens/units: ${x%100}+${y%100}`,`= ${a}`];}
    else if(t===1){let x=rand(100,999),y=rand(10,x);q=`${x} − ${y}`;a=x-y;steps=[`= ${a}`];}
    else if(t===2){let x=rand(12,25),y=rand(12,25);q=`${x} × ${y}`;a=x*y;let p=Math.floor(y/10)*10;steps=[`${x}×${p}=${x*p}`,`${x}×${y-p}=${x*(y-p)}`,`Sum = ${a}`];}
    else{let y=rand(3,15),x=y*rand(3,20);q=`${x} ÷ ${y}`;a=x/y;steps=[`${y}×${a}=${x}`,`Answer: ${a}`];}
  } else {
    const t=rand(0,4);
    if(t===0){let x=rand(100,999),y=rand(100,999);q=`${x} + ${y}`;a=x+y;steps=[`= ${a}`];}
    else if(t===1){let x=rand(200,999),y=rand(100,x-1);q=`${x} − ${y}`;a=x-y;steps=[`= ${a}`];}
    else if(t===2){let x=rand(15,50),y=rand(15,50);q=`${x} × ${y}`;a=x*y;let p=Math.floor(y/10)*10;steps=[`${x}×${p}=${x*p}`,`${x}×${y-p}=${x*(y-p)}`,`Sum: ${a}`];}
    else if(t===3){let p=rand(2,9),r=rand(2,9);q=`${p*p*r} ÷ ${p}`;a=p*r;steps=[`${p*p*r}=${p}²×${r}`,`÷${p} → ${a}`];}
    else{let x=rand(10,50);q=`${x}²`;a=x*x;steps=[`${x}×${x}=${a}`];}
  }
  return{q,a,steps,sub:'',topic:'Arithmetic'};
}

// ── TMUA GENERATORS (spec-compliant) ─────────────────────────────────────

// MM1: Algebra — indices, surds, quadratics, polynomials
function genIndices(){
  const t=rand(0,3);
  if(t===0){
    // Laws of indices: x^a * x^b = x^(a+b)
    const base=pick([2,3,5]);
    const a=rand(2,5),b=rand(2,5);
    const ans=Math.pow(base,a+b);
    return{q:`${base}^${a} × ${base}^${b} = ?`,a:ans,sub:'As a number',topic:'Indices',
      steps:[`Same base: add exponents`,`${base}^(${a}+${b}) = ${base}^${a+b}`,`= ${ans}`]};
  } else if(t===1){
    // x^a ÷ x^b
    const base=pick([2,3]);
    const a=rand(4,8),b=rand(1,a-1);
    const ans=Math.pow(base,a-b);
    return{q:`${base}^${a} ÷ ${base}^${b} = ?`,a:ans,sub:'As a number',topic:'Indices',
      steps:[`Subtract exponents: ${base}^(${a}−${b})`,`= ${base}^${a-b} = ${ans}`]};
  } else if(t===2){
    // (x^a)^b
    const base=pick([2,3]);
    const a=rand(2,4),b=rand(2,3);
    const ans=Math.pow(base,a*b);
    return{q:`(${base}^${a})^${b} = ?`,a:ans,sub:'As a number',topic:'Indices',
      steps:[`Multiply exponents: ${base}^(${a}×${b})`,`= ${base}^${a*b} = ${ans}`]};
  } else {
    // Negative/fractional: x^(1/2), x^(-1)
    const squares=[4,9,16,25,36,49,64,81,100];
    const x=pick(squares);
    return{q:`${x}^(1/2) = ?`,a:Math.sqrt(x),sub:'',topic:'Indices',
      steps:[`x^(1/2) = √x`,`√${x} = ${Math.sqrt(x)}`]};
  }
}

function genQuadratics(){
  const t=rand(0,4);
  if(t===0){
    // Discriminant b²-4ac
    const r1=rand(-5,5),r2=rand(-5,5);
    const B=-(r1+r2),C=r1*r2;
    const disc=B*B-4*C;
    const Bs=(B>=0?'+':'')+B, Cs=(C>=0?'+':'')+C;
    return{q:`Discriminant of x²${Bs}x${Cs}=0?`,a:disc,sub:'b²−4ac',topic:'Quadratics',
      steps:[`b=${B}, a=1, c=${C}`,`Δ = ${B}²−4(1)(${C}) = ${B*B}−${4*C}`,`= ${disc}`]};
  } else if(t===1){
    // Sum of roots = -b/a
    const r1=rand(-6,6),r2=rand(-6,6);
    const B=-(r1+r2),C=r1*r2;
    const Bs=(B>=0?'+':'')+B, Cs=(C>=0?'+':'')+C;
    return{q:`Sum of roots of x²${Bs}x${Cs}=0?`,a:r1+r2,sub:'Factor theorem / Vieta',topic:'Quadratics',
      steps:[`Sum of roots = −b/a = −(${B})`,`= ${r1+r2}`]};
  } else if(t===2){
    // Product of roots = c/a
    const r1=rand(-5,5),r2=rand(-5,5);
    const B=-(r1+r2),C=r1*r2;
    const Bs=(B>=0?'+':'')+B, Cs=(C>=0?'+':'')+C;
    return{q:`Product of roots of x²${Bs}x${Cs}=0?`,a:r1*r2,sub:'Factor theorem / Vieta',topic:'Quadratics',
      steps:[`Product of roots = c/a = ${C}/1`,`= ${r1*r2}`]};
  } else if(t===3){
    // Completing the square: min/max value
    const a=rand(1,3),h=rand(-4,4),k=rand(-5,5);
    // f(x) = a(x+h)² + k → min value is k (if a>0)
    return{q:`Minimum of ${a}(x${h>=0?'+':''}${h})²${k>=0?'+':''}${k}?`,a:k,sub:'Completed square form',topic:'Quadratics',
      steps:[`Form a(x−p)²+q has min q when a>0`,`Min value = ${k}`]};
  } else {
    // Evaluate polynomial using factor theorem
    const a=rand(1,3),b=rand(-5,5),c=rand(-6,6),x0=pick([-3,-2,-1,1,2,3]);
    const ans=a*x0*x0+b*x0+c;
    const Bs=(b>=0?'+':'')+b,Cs=(c>=0?'+':'')+c;
    return{q:`f(${x0}) for f(x)=${a}x²${Bs}x${Cs}?`,a:ans,sub:'Evaluate',topic:'Algebra',
      steps:[`f(${x0})=${a}(${x0})²${b>=0?'+':''}${b}(${x0})${c>=0?'+':''}${c}`,`=${a*x0*x0}${b*x0>=0?'+':(b*x0<0?'':'')}${b*x0}${c>=0?'+':''}${c}`,`=${ans}`]};
  }
}

function genPolynomials(){
  const t=rand(0,2);
  if(t===0){
    // Remainder theorem: f(a) gives remainder when divided by (x-a)
    const a=rand(1,3),b=rand(-4,4),c=rand(-6,6),r=pick([-2,-1,1,2,3]);
    const rem=a*r*r+b*r+c;
    const Bs=(b>=0?'+':'')+b,Cs=(c>=0?'+':'')+c;
    return{q:`Remainder when ${a}x²${Bs}x${Cs} is divided by (x−${r})?`,a:rem,sub:'Remainder theorem',topic:'Polynomials',
      steps:[`By Remainder Theorem: substitute x=${r}`,`f(${r}) = ${a}(${r})²${b>=0?'+':''}${b}(${r})${c>=0?'+':''}${c}`,`= ${a*r*r}${b*r>=0?'+':''}${b*r}${c>=0?'+':''}${c} = ${rem}`]};
  } else if(t===1){
    // Factor theorem: is (x-a) a factor? — random roots each time
    let r1=rand(-4,4),r2=rand(-4,4);
    const B=-(r1+r2),C=r1*r2;
    // 50/50: test an actual root, or a deliberate near-miss
    const testRoot=rand(0,1)?pick([r1,r2]):pick([r1,r2])+pick([1,-1,2,-2]);
    const isF=(testRoot===r1||testRoot===r2)?1:0;
    const Bs=(B>=0?'+':'')+B,Cs=(C>=0?'+':'')+C;
    const fac=testRoot>=0?`(x−${testRoot})`:`(x+${-testRoot})`;
    return{q:`Is ${fac} a factor of x²${Bs}x${Cs}? (1=yes, 0=no)`,a:isF,sub:'Factor theorem',topic:'Polynomials',
      steps:[`Substitute x=${testRoot}: f(${testRoot}) = ${testRoot*testRoot+B*testRoot+C}`,`f(${testRoot}) ${isF?'= 0 → yes':'≠ 0 → no'}`,`Answer: ${isF}`]};
  } else {
    // Algebraic division: find quotient coefficient
    // (x² + bx + c) ÷ (x - r), find coefficient of x in quotient
    const r=pick([-3,-2,-1,1,2,3]);
    const q_coeff=rand(1,4); // quotient is x + q_coeff
    const B=q_coeff-r, C=-r*q_coeff;
    const Bs=(B>=0?'+':'')+B,Cs=(C>=0?'+':'')+C;
    return{q:`Coefficient of x when x²${Bs}x${Cs} divided by (x−${r})?`,a:q_coeff,sub:'Polynomial division',topic:'Polynomials',
      steps:[`x²${Bs}x${Cs} = (x−${r})(x+?)`,`Expand (x−${r})(x+${q_coeff}): x²+${q_coeff}x−${r}x−${r*q_coeff}`,`= x²+${B}x+${C} ✓, coefficient = ${q_coeff}`]};
  }
}

function genSequences(){

    return{q:`${n}th term of AP: ${a}, ${a+d}, ${a+2*d},...?`,a:ans,sub:'Arithmetic progression',topic:'Sequences',
      steps:[`aₙ = a+(n−1)d`,`= ${a}+(${n}−1)×${d}`,`= ${a}+${(n-1)*d} = ${ans}`]};
  } else if(t===1){
    // Sum of AP: Sn = n/2(2a+(n-1)d)
    const a=rand(1,5),d=rand(1,5),n=rand(5,15);
    const ans=n*(2*a+(n-1)*d)/2;
    return{q:`Sum of first ${n} terms: AP a=${a}, d=${d}?`,a:ans,sub:'Sum of AP',topic:'Sequences',
      steps:[`Sₙ = n/2×(2a+(n−1)d)`,`= ${n}/2×(${2*a}+${(n-1)*d})`,`= ${n}/2×${2*a+(n-1)*d} = ${ans}`]};
  } else if(t===2){
    // Sum of first n natural numbers
    const n=rand(5,20);
    const ans=n*(n+1)/2;
    return{q:`Sum 1+2+3+...+${n} = ?`,a:ans,sub:'Sum of naturals',topic:'Sequences',
      steps:[`Formula: n(n+1)/2`,`= ${n}×${n+1}/2`,`= ${ans}`]};
  } else {
    // GP nth term or sum
    const a=rand(1,4),r=pick([2,3,-2]),n=rand(3,6);
    const t2=rand(0,1);
    if(t2===0){
      const ans=a*Math.pow(r,n-1);
      return{q:`${n}th term of GP: ${a}, ${a*r}, ${a*r*r},...?`,a:ans,sub:'Geometric progression',topic:'Sequences',
        steps:[`aₙ = a×r^(n−1)`,`= ${a}×${r}^${n-1}`,`= ${ans}`]};
    } else {
      // Sum of finite GP: a(r^n-1)/(r-1)
      const ans=a*(Math.pow(r,n)-1)/(r-1);
      if(!Number.isInteger(ans))return genSequences();
      return{q:`Sum of first ${n} terms of GP: a=${a}, r=${r}?`,a:ans,sub:'Sum of GP',topic:'Sequences',
        steps:[`Sₙ = a(rⁿ−1)/(r−1)`,`= ${a}(${r}^${n}−1)/(${r}−1)`,`= ${a}×${Math.pow(r,n)-1}/${r-1} = ${ans}`]};
    }
  }
}

function genDiff(){
  const t=rand(0,3);

      steps:[`f'(x) = ${coeff*n}x^${n-1}`,`f'(${x0}) = ${coeff*n}×${x0}^${n-1}`,`= ${coeff*n}×${Math.pow(x0,n-1)} = ${ans}`]};
  } else if(t===1){
    // Find stationary point x-coord: f'(x)=0
    const a=rand(1,3),h=rand(-4,4);
    // f(x)=a(x-h)² + k → f'(x)=2a(x-h)=0 → x=h
    const k=rand(-5,5);
    const B=-2*a*h,C=a*h*h+k;
    const Bs=(B>=0?'+':'')+B,Cs=(C>=0?'+':'')+C;
    return{q:`x-coordinate of stationary point of ${a}x²${Bs}x${Cs}?`,a:h,sub:'Set f\'(x)=0',topic:'Differentiation',
      steps:[`f'(x) = ${2*a}x${B>=0?'+':''}${B}`,`Set to 0: x = −(${B})/${2*a}`,`x = ${h}`]};
  } else if(t===2){
    // Gradient at a point
    const n=rand(2,4),coeff=rand(1,3),x0=pick([1,2,3,-1,-2]);
    const ans=coeff*n*Math.pow(x0,n-1);
    return{q:`Gradient of y=${coeff}x^${n} at x=${x0}?`,a:ans,sub:'dy/dx at point',topic:'Differentiation',
      steps:[`dy/dx = ${coeff*n}x^${n-1}`,`At x=${x0}: ${coeff*n}×${x0}^${n-1} = ${ans}`]};
  } else {
    // Second derivative
    const n=rand(3,5),coeff=rand(1,3);
    const ans_coeff=coeff*n*(n-1);
    const power=n-2;
    return{q:`f(x)=${coeff}x^${n}. f''(x) at x=1?`,a:ans_coeff,sub:'Second derivative',topic:'Differentiation',
      steps:[`f'(x) = ${coeff*n}x^${n-1}`,`f''(x) = ${ans_coeff}x^${power}`,`f''(1) = ${ans_coeff}`]};
  }
}

  } else {

    return{q:`y=f(x) reflected in the x-axis. New form?`,a:0,sub:'Answer: 0 = yes this is y=−f(x) (type 0)',topic:'Graph Transforms',
      steps:[`Reflection in x-axis: y = −f(x)`]};
  }
}

// MM: Number / Ratio / Proportion
function genNumber(){
  const t=rand(0,4);
  if(t===0){
    // Standard form
    const a=parseFloat((Math.random()*8.9+1).toFixed(1));
    const n=rand(2,6);
    const ans=a*Math.pow(10,n);
    return{q:`${a}×10^${n} as ordinary number?`,a:ans,sub:'Standard form',topic:'Number',
      steps:[`Move decimal ${n} places right`,`= ${ans}`]};
  } else if(t===1){
    // Percentage of a quantity
    const pcts=[10,15,20,25,30,40,50,75];
    const pct=pick(pcts),total=rand(2,20)*10;
    const ans=pct*total/100;
    return{q:`${pct}% of ${total} = ?`,a:ans,sub:'',topic:'Number',
      steps:[`${pct}/100 × ${total}`,`= ${ans}`]};
  } else if(t===2){
    // HCF — build from a chosen HCF g and coprime multipliers so the answer is exactly g
    const g=pick([2,3,4,5,6,7,8,9]);
    let m,n;do{m=rand(2,9);n=rand(2,9);}while(gcd(m,n)!==1||m===n);
    const a=g*m,b=g*n,ans=g;
    return{q:`HCF of ${a} and ${b}?`,a:ans,sub:'Highest common factor',topic:'Number',
      steps:[`${a} = ${factorStr(a)}`,`${b} = ${factorStr(b)}`,`HCF = ${ans}`]};
  } else if(t===3){
    // LCM — same construction; LCM = g·m·n since m,n are coprime
    const g=pick([2,3,4,5,6]);
    let m,n;do{m=rand(2,7);n=rand(2,7);}while(gcd(m,n)!==1||m===n);
    const a=g*m,b=g*n,ans=g*m*n;
    return{q:`LCM of ${a} and ${b}?`,a:ans,sub:'Lowest common multiple',topic:'Number',
      steps:[`HCF = ${g}`,`LCM = a×b/HCF = ${a}×${b}/${g}`,`= ${ans}`]};
  } else {
    // Compound interest (single period)
    const P=pick([100,200,500,1000]),r=pick([5,10,20,25]),n=rand(1,3);
    const ans=P*Math.pow(1+r/100,n);
    if(!Number.isInteger(ans))return genNumber();
    return{q:`£${P} invested at ${r}% pa for ${n} year${n>1?'s':''}. Amount?`,a:ans,sub:'Compound interest',topic:'Number',
      steps:[`A = P(1+r/100)^n`,`= ${P}×(1+${r}/100)^${n}`,`= ${P}×${(1+r/100)**n} = ${ans}`]};
  }
}

function factorStr(n){
  const f={};let d=2,m=n;
  while(d*d<=m){while(m%d===0){f[d]=(f[d]||0)+1;m=Math.floor(m/d);}d++;}
  if(m>1)f[m]=(f[m]||0)+1;
  return Object.entries(f).map(([p,e])=>e>1?`${p}^${e}`:p).join('×');
}

// Polygon geometry
function genPolygonGeometry(){
  const t=rand(0,2);
  if(t===0){
    // Interior angle sum
    const ns=[4,5,6,7,8,9,10,12];
    const n=pick(ns);
    const ans=(n-2)*180;
    return{q:`Sum of interior angles of a ${n}-gon?`,a:ans,sub:'In degrees',topic:'Geometry',
      steps:[`Formula: (n−2)×180°`,(n-2>0?`= ${n-2}×180°`:`= 0`),`= ${ans}°`]};
  } else if(t===1){
    // Interior angle of regular polygon
    const ns=[5,6,7,8,9,10,12];
    const n=pick(ns);
    const ans=(n-2)*180/n;
    if(!Number.isInteger(ans))return genPolygonGeometry();
    return{q:`Interior angle of regular ${n}-gon?`,a:ans,sub:'In degrees',topic:'Geometry',
      steps:[`(n−2)×180/n`,`= ${n-2}×180/${n}`,`= ${ans}°`]};
  } else {
    // Number of diagonals
    const ns=[4,5,6,7,8,10];
    const n=pick(ns);
    const ans=n*(n-3)/2;
    return{q:`Diagonals of a ${n}-gon?`,a:ans,sub:'',topic:'Geometry',
      steps:[`n(n−3)/2`,`= ${n}×${n-3}/2`,`= ${ans}`]};
  }
}

// Probability (spec: conditional, tree, Venn — simple combinations)
function genProbability(){
  const t=rand(0,3);
  if(t===0){
    // P(A∪B) = P(A)+P(B)−P(A∩B) — random tenths with P(A∩B) ≤ min and union ≤ 1
    let pa,pb,pab,ans;
    do{
      pa=rand(2,7)/10;pb=rand(2,7)/10;
      pab=rand(1,Math.round(Math.min(pa,pb)*10))/10;
      ans=+(pa+pb-pab).toFixed(2);
    }while(ans>1);
    return{q:`P(A)=${pa}, P(B)=${pb}, P(A∩B)=${pab}. P(A∪B)?`,a:ans,sub:'Addition rule',topic:'Probability',
      steps:[`P(A∪B)=P(A)+P(B)−P(A∩B)`,`=${pa}+${pb}−${pab}`,`=${ans}`]};
  } else if(t===1){
    // Conditional P(B|A)=P(A∩B)/P(A)
    const denoms=[4,5,10,20];
    const denom=pick(denoms);
    const both=rand(1,Math.floor(denom/2));
    const countA=rand(both+1,Math.min(denom-1,both*3));
    const ans=parseFloat((both/countA).toFixed(2));
    return{q:`P(B|A)? P(A∩B)=${both}/${denom}, P(A)=${countA}/${denom}`,a:ans,sub:'Conditional probability (2 d.p.)',topic:'Probability',
      steps:[`P(B|A) = P(A∩B)/P(A)`,`= (${both}/${denom})/(${countA}/${denom})`,`= ${both}/${countA} ≈ ${ans}`]};
  } else if(t===2){
    // Mutually exclusive: P(A)+P(B) — random tenths keeping the sum ≤ 1
    let pa,pb;do{pa=rand(1,6)/10;pb=rand(1,6)/10;}while(pa+pb>1);
    const ans=+(pa+pb).toFixed(2);
    return{q:`A,B mutually exclusive. P(A)=${pa}, P(B)=${pb}. P(A or B)?`,a:ans,sub:'Mutually exclusive',topic:'Probability',
      steps:[`Mutually exclusive → P(A or B)=P(A)+P(B)`,`=${pa}+${pb}=${ans}`]};
  } else {
    // Independent events — random tenths
    const p1=rand(1,9)/10,p2=rand(1,9)/10;
    const ans=+(p1*p2).toFixed(2);
    return{q:`P(A)=${p1}, P(B)=${p2}, independent. P(A and B)?`,a:ans,sub:'Independent events',topic:'Probability',
      steps:[`Independent: P(A∩B)=P(A)×P(B)`,`=${p1}×${p2}`,`=${ans}`]};
  }
}

// ── SMC / PROBLEM SOLVING (Senior Maths Challenge style) ──────────────────
// Every one is built from random parameters, so nothing is a fixed bank.
function genSMC(){
  const hard=diff==='hard';
  const gens=[
    // Consecutive integers
    ()=>{const m=rand(5,hard?90:40);const s=3*m;return{q:`Three consecutive integers add up to ${s}. What is the largest of the three?`,a:m+1,sub:'Problem solving',topic:'SMC',steps:[`Middle number = ${s} ÷ 3 = ${m}`,`Largest = ${m} + 1 = ${m+1}`]};},
    // Handshakes / pairs
    ()=>{const n=rand(5,hard?20:12);const a=n*(n-1)/2;return{q:`${n} people each shake hands once with every other person. How many handshakes take place?`,a,sub:'Problem solving',topic:'SMC',steps:[`Each pair shakes once: n(n−1)/2`,`= ${n}×${n-1}/2 = ${a}`]};},
    // Painted cube — no painted face
    ()=>{const n=rand(3,hard?7:6);const a=(n-2)**3;return{q:`A ${n}×${n}×${n} cube is painted on the outside, then cut into unit cubes. How many unit cubes have no painted face?`,a,sub:'Problem solving',topic:'SMC',steps:[`The unpainted cubes form an inner (n−2)³ block`,`= ${n-2}³ = ${a}`]};},
    // Painted cube — exactly two painted faces
    ()=>{const n=rand(3,hard?7:6);const a=12*(n-2);return{q:`A ${n}×${n}×${n} cube is painted, then cut into unit cubes. How many have exactly two painted faces?`,a,sub:'Problem solving',topic:'SMC',steps:[`These sit along edges (not corners): 12 edges × (n−2)`,`= 12 × ${n-2} = ${a}`]};},
    // Sum of first n odd numbers = n²
    ()=>{const n=rand(4,hard?20:12);const a=n*n;return{q:`What is the value of 1 + 3 + 5 + … + ${2*n-1} (the first ${n} odd numbers)?`,a,sub:'Problem solving',topic:'SMC',steps:[`Sum of the first n odd numbers = n²`,`= ${n}² = ${a}`]};},
    // Mean — find the missing value
    ()=>{const n=rand(4,6),mean=rand(5,15),total=n*mean;const others=[];let sum=0;for(let i=0;i<n-1;i++){const v=rand(1,mean+5);others.push(v);sum+=v;}const missing=total-sum;if(missing<1||missing>60)return null;return{q:`The mean of ${n} numbers is ${mean}. ${n-1} of them are ${others.join(', ')}. What is the remaining number?`,a:missing,sub:'Problem solving',topic:'SMC',steps:[`Total = ${n} × ${mean} = ${total}`,`Sum of the known numbers = ${sum}`,`Remaining = ${total} − ${sum} = ${missing}`]};},
    // Percentage up then down
    ()=>{const P=pick([100,200,400,500,800,1000]),up=pick([10,20,25,50]),down=pick([10,20,25,50]);const afterUp=P*(1+up/100),fin=afterUp*(1-down/100);if(!Number.isInteger(fin))return null;return{q:`£${P} is increased by ${up}%, then that result is decreased by ${down}%. What is the final amount (£)?`,a:fin,sub:'Problem solving',topic:'SMC',steps:[`After +${up}%: ${P} × ${1+up/100} = ${afterUp}`,`After −${down}%: ${afterUp} × ${1-down/100} = ${fin}`]};},
    // Ratio — largest share
    ()=>{const parts=[rand(1,3),rand(2,4),rand(3,5)],unit=rand(2,hard?12:8),sum=parts.reduce((s,p)=>s+p,0),total=sum*unit,largest=Math.max(...parts)*unit;return{q:`£${total} is shared between three people in the ratio ${parts.join(':')}. What is the largest share (£)?`,a:largest,sub:'Problem solving',topic:'SMC',steps:[`Total parts = ${parts.join(' + ')} = ${sum}`,`One part = ${total} ÷ ${sum} = ${unit}`,`Largest = ${Math.max(...parts)} × ${unit} = ${largest}`]};},
    // Inclusion–exclusion — how many do neither
    ()=>{const both=rand(2,6),a=rand(both+2,both+10),b=rand(both+2,both+10),neither=rand(1,8),N=a+b-both+neither;return{q:`In a class of ${N}, ${a} study French and ${b} study German. ${both} study both. How many study neither?`,a:neither,sub:'Problem solving',topic:'SMC',steps:[`Studying at least one = ${a} + ${b} − ${both} = ${a+b-both}`,`Neither = ${N} − ${a+b-both} = ${neither}`]};},
    // Number of positive factors
    ()=>{const e2=rand(1,hard?4:3),e3=rand(1,2),N=(2**e2)*(3**e3),cnt=(e2+1)*(e3+1);return{q:`How many positive factors (divisors) does ${N} have?`,a:cnt,sub:'Problem solving',topic:'SMC',steps:[`${N} = 2^${e2} × 3^${e3}`,`Number of factors = (${e2}+1)(${e3}+1) = ${cnt}`]};},
    // Clock angle on the hour
    ()=>{const h=rand(1,11),raw=30*h,ang=Math.min(raw,360-raw);return{q:`What is the smaller angle between the hands of a clock at ${h} o'clock? (in degrees)`,a:ang,sub:'Problem solving',topic:'SMC',steps:[`Each hour mark is 30°, so ${h} hours = ${raw}°`,`Smaller angle = ${ang}°`]};},
    // Distance / speed / time
    ()=>{const s=pick([30,40,50,60,80]),t=rand(2,5),d=s*t;return{q:`A car travels ${d} km at a steady ${s} km/h. How many hours does the journey take?`,a:t,sub:'Problem solving',topic:'SMC',steps:[`Time = distance ÷ speed`,`= ${d} ÷ ${s} = ${t} hours`]};},
    // Perfect squares in a range
    ()=>{const lo=rand(1,5),hi=rand(lo+3,12),A=lo*lo,B=hi*hi,cnt=hi-lo+1;return{q:`How many perfect squares are there between ${A} and ${B} inclusive?`,a:cnt,sub:'Problem solving',topic:'SMC',steps:[`√${A} = ${lo} and √${B} = ${hi}`,`Count = ${hi} − ${lo} + 1 = ${cnt}`]};},
    // Reverse the digits — difference
    ()=>{let a=rand(1,9),b=rand(0,9);while(a===b)b=rand(0,9);const orig=10*a+b,rev=10*b+a,diff=Math.abs(orig-rev);return{q:`Take ${orig}, reverse its digits, and find the positive difference between the number and its reverse.`,a:diff,sub:'Problem solving',topic:'SMC',steps:[`${orig} with digits reversed is ${rev}`,`Difference = |${orig} − ${rev}| = ${diff}`]};},
    // Fraction spent — amount left
    ()=>{const denom=pick([2,3,4,5]),N=denom*rand(4,20),spent=N/denom,left=N-spent;return{q:`Sam has £${N} and spends 1/${denom} of it. How much money is left (£)?`,a:left,sub:'Problem solving',topic:'SMC',steps:[`Spent = ${N} ÷ ${denom} = ${spent}`,`Left = ${N} − ${spent} = ${left}`]};},
    // Triangular number
    ()=>{const n=rand(4,hard?20:15),a=n*(n+1)/2;return{q:`A triangular pattern has ${n} rows containing 1, 2, 3, …, ${n} dots. How many dots in total?`,a,sub:'Problem solving',topic:'SMC',steps:[`Total = n(n+1)/2`,`= ${n} × ${n+1} / 2 = ${a}`]};},
  ];
  for(let i=0;i<10;i++){const g=pick(gens)();if(g&&Number.isInteger(g.a))return g;}
  const n=rand(5,12);return{q:`${n} people each shake hands once with every other person. How many handshakes?`,a:n*(n-1)/2,sub:'Problem solving',topic:'SMC',steps:[`n(n−1)/2 = ${n*(n-1)/2}`]};
}

// Re-roll until we get a question not already shown this session (resets each session,
// so nothing is lost forever — questions can reappear in a later session).
function generateUnique(){
  const gen=mode==='arithmetic'?generateArithmetic:generateTMUA;
  let q=null;
  for(let i=0;i<40;i++){
    q=gen();
    if(q&&q.q&&!seenQuestions.has(q.q)){seenQuestions.add(q.q);return q;}
  }
  if(q&&q.q)seenQuestions.add(q.q); // space exhausted — accept a repeat rather than hang
  return q;
}

// TMUA dispatcher
function generateTMUA(){
  let gens;
  if(diff==='easy'){
    gens=[genIndices,genQuadratics,genSequences,genBinomial,genLogs,genTrigExact,genPythagoras,genNumber,genPolygonGeometry,genProbability,genCoordGeom,genSMC];
  } else if(diff==='medium'){
    gens=[genIndices,genQuadratics,genPolynomials,genSequences,genBinomial,genCoordGeom,genCircleGeom,genLogs,genTrigExact,genTrigSolve,genRadians,genPythagoras,genDiff,genIntegration,genNumber,genPolygonGeometry,genProbability,genTransformations,genSMC];
  } else {
    // Hard: full spec, harder parameters, all generators
    gens=[genIndices,genQuadratics,genPolynomials,genSequences,genBinomial,genCoordGeom,genCircleGeom,genLogs,genTrigExact,genTrigSolve,genRadians,genPythagoras,genDiff,genIntegration,genNumber,genPolygonGeometry,genProbability,genTransformations,genSMC];
  }
  for(let i=0;i<10;i++){
    try{
      const q=pick(gens)();
      if(q&&q.a!==undefined&&!isNaN(q.a))return q;
    }catch(e){}
  }
  return{q:'2³ × 2⁴ = ?',a:128,sub:'',topic:'Indices',steps:['2^(3+4)=2^7=128']};
}

// ── SESSION LOGIC ─────────────────────────────────────────────────────────
function parseAnswer(str){
  str=(str==null?'':''+str).trim();
  if(str==='')return NaN;
  if(str.indexOf('/')!==-1){
    const parts=str.split('/');
    if(parts.length!==2)return NaN;
    const n=parseFloat(parts[0].trim()),d=parseFloat(parts[1].trim());
    if(isNaN(n)||isNaN(d)||d===0)return NaN;
    return n/d;
  }
  return parseFloat(str);
}

function handleInput(){
  if(answerStyle!=='type'||!accepting||!currentQ)return;
  const val=parseAnswer(document.getElementById('answer-input').value);
  if(isNaN(val))return;
  if(Math.abs(val-currentQ.a)<0.015){
    accepting=false;score++;streak++;totalAttempted++;
    if(streak>best)best=streak;
    const inp=document.getElementById('answer-input');
    inp.classList.add('correct');inp.disabled=true;
    showFeedback(true,streak>=3?`Correct! ${streak} in a row 🔥`:'Correct!');
    updateStats();setTimeout(nextQuestion,600);
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  applyAnswerStyle();
  document.getElementById('answer-input').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&sessionActive&&!paused&&accepting){
      const val=parseAnswer(this.value);
      if(!isNaN(val)&&Math.abs(val-currentQ.a)>=0.015)showWrong();
    }
  });
  // Pick a multiple-choice option with keys 1–5 or A–E
  document.addEventListener('keydown',e=>{
    if(answerStyle!=='choice'||!sessionActive||paused||!accepting)return;
    let idx=-1;
    if(e.key>='1'&&e.key<='5')idx=+e.key-1;
    else{const k=e.key.toLowerCase();if(k>='a'&&k<='e')idx='abcde'.indexOf(k);}
    if(idx>=0&&idx<currentChoices.length){e.preventDefault();chooseOption(idx);}
  });
});

function nextQuestion(){
  accepting=false;hideSolution();
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  currentQ=generateUnique();
  document.getElementById('question-text').textContent=currentQ.q;
  document.getElementById('question-sub').textContent=currentQ.sub||'';
  const badge=document.getElementById('topic-badge');
  if(mode==='tmua'&&currentQ.topic){badge.textContent=currentQ.topic;badge.style.display='inline-block';}
  else badge.style.display='none';
  accepting=true;
  renderAnswerArea();
}

// Swap the answer widgets for the current question depending on the chosen style
function applyAnswerStyle(){
  document.getElementById('choices').style.display=answerStyle==='choice'?'flex':'none';
  document.getElementById('answer-input').style.display=answerStyle==='type'?'block':'none';
}
function setAnswerStyle(s){
  answerStyle=s;
  document.querySelectorAll('.answer-toggle button').forEach((b,i)=>b.classList.toggle('active',(i===0&&s==='choice')||(i===1&&s==='type')));
  applyAnswerStyle();
  if(sessionActive&&!paused&&accepting&&currentQ)renderAnswerArea();
}
function renderAnswerArea(){
  applyAnswerStyle();
  const inp=document.getElementById('answer-input');
  const choicesEl=document.getElementById('choices');
  if(answerStyle==='type'){
    choicesEl.innerHTML='';
    inp.value='';inp.disabled=false;inp.className='answer-input';inp.focus();
  } else {
    inp.value='';inp.disabled=true;inp.className='answer-input';
    currentChoices=buildChoices(currentQ.a);
    choicesEl.innerHTML=currentChoices.map((v,i)=>
      `<button class="choice" onclick="chooseOption(${i})"><span class="key">${'ABCDE'[i]}</span><span>${formatNum(v)}</span></button>`
    ).join('');
  }
}

function chooseOption(i){
  if(answerStyle!=='choice'||!accepting||!currentQ)return;
  const v=currentChoices[i];
  const btns=document.querySelectorAll('#choices .choice');
  btns.forEach(b=>b.disabled=true);
  if(Math.abs(v-currentQ.a)<0.015){
    accepting=false;score++;streak++;totalAttempted++;
    if(streak>best)best=streak;
    btns[i].classList.add('correct');
    showFeedback(true,streak>=3?`Correct! ${streak} in a row 🔥`:'Correct!');
    updateStats();setTimeout(nextQuestion,600);
  } else {
    btns[i].classList.add('wrong');
    btns.forEach((b,j)=>{if(Math.abs(currentChoices[j]-currentQ.a)<0.015)b.classList.add('correct');});
    pauseForWrong();
  }
}

function pauseForWrong(){
  accepting=false;paused=true;clearInterval(sessionInterval);
  totalAttempted++;streak=0;updateStats();
  showFeedback(false,'Wrong — timer paused. Study the solution, then continue.');
  showSolution(currentQ);
  document.getElementById('next-btn').classList.add('visible');
}

function showWrong(){
  const inp=document.getElementById('answer-input');
  inp.classList.add('wrong');inp.disabled=true;
  pauseForWrong();
}

// ── Multiple-choice option building ───────────────────────────────────────
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rand(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function formatNum(v){return Number.isInteger(v)?''+v:''+(+v.toFixed(4));}
function keyOf(v){return (+(+v).toFixed(4)).toString();}
function buildChoices(ans){
  const isInt=Number.isInteger(ans),mag=Math.abs(ans);
  let raw=isInt
    ? [ans+1,ans-1,ans+2,ans-2,ans+3,ans-3,ans+5,ans-5,ans+10,ans-10,2*ans,-ans]
    : [ans+0.1,ans-0.1,ans+0.5,ans-0.5,ans+ (mag<1?0.25:1),ans- (mag<1?0.25:1),2*ans,ans/2,-ans].map(v=>+v.toFixed(4));
  const step=isInt?1:(mag<1?0.1:1);
  const seen=new Set([keyOf(ans)]),distinct=[];
  shuffle(raw);
  for(const v of raw){
    if(!Number.isFinite(v)||Math.abs(v-ans)<1e-9)continue;
    const k=keyOf(v);if(seen.has(k))continue;
    seen.add(k);distinct.push(v);
    if(distinct.length>=4)break;
  }
  let pad=1;
  while(distinct.length<4&&pad<60){
    const v=+(ans+pad*step).toFixed(4),k=keyOf(v);
    if(!seen.has(k)&&Math.abs(v-ans)>1e-9){seen.add(k);distinct.push(v);}
    pad++;
  }
  return shuffle([ans,...distinct]);
}

function resumeSession(){paused=false;document.getElementById('next-btn').classList.remove('visible');nextQuestion();startTimer();}

function showSolution(q){
  const panel=document.getElementById('solution-panel');
  const steps=document.getElementById('solution-steps');
  const ans=document.getElementById('solution-answer');
  steps.innerHTML='';
  (q.steps||[]).forEach((s,i)=>{const li=document.createElement('li');li.innerHTML=`<span>${i+1}.</span>${s}`;steps.appendChild(li);});
  ans.textContent=`Answer: ${q.a}`;
  panel.classList.add('visible');
}

function hideSolution(){document.getElementById('solution-panel').classList.remove('visible');}
function showFeedback(ok,msg){const el=document.getElementById('feedback');el.textContent=msg;el.className='feedback '+(ok?'correct':'wrong');}
function updateStats(){document.getElementById('score').textContent=score;document.getElementById('streak').textContent=streak;document.getElementById('best').textContent=best;}
function formatTime(s){const m=Math.floor(s/60);const sec=Math.ceil(s%60);return`${m}:${sec.toString().padStart(2,'0')}`;}

function updateSessionTimer(){
  const el=document.getElementById('session-timer');
  el.textContent=formatTime(sessionTimeLeft);
  el.className='session-timer-value'+(sessionTimeLeft<=10?' danger':sessionTimeLeft<=30?' warning':'');
  const bar=document.getElementById('timer-bar');
  const pct=(sessionTimeLeft/120)*100;
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'var(--blue)':pct>20?'var(--amber)':'var(--red)';
}

function startTimer(){
  clearInterval(sessionInterval);
  sessionInterval=setInterval(()=>{sessionTimeLeft-=0.1;updateSessionTimer();if(sessionTimeLeft<=0){clearInterval(sessionInterval);endSession();}},100);
}

function startSession(){
  sessionActive=true;paused=false;score=0;streak=0;totalAttempted=0;sessionTimeLeft=120;
  seenQuestions.clear();
  updateStats();updateSessionTimer();
  document.getElementById('start-btn').textContent='Restart';
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('main-area').style.display='block';
  hideSolution();document.getElementById('next-btn').classList.remove('visible');
  nextQuestion();startTimer();
}

function endSession(){
  sessionActive=false;accepting=false;clearInterval(sessionInterval);
  document.getElementById('answer-input').disabled=true;
  document.getElementById('choices').innerHTML='';
  document.getElementById('main-area').style.display='none';
  document.getElementById('end-screen').classList.add('visible');
  document.getElementById('end-score').textContent=score;
  const acc=totalAttempted>0?Math.round((score/totalAttempted)*100):0;
  document.getElementById('end-detail').textContent=`${totalAttempted} attempted · ${acc}% accuracy · best streak: ${best}`;
  savedThisSession=false;
  const saveBtn=document.getElementById('save-btn');
  saveBtn.textContent='Save';saveBtn.disabled=false;
  const nameInput=document.getElementById('name-input');
  nameInput.disabled=false;nameInput.value=localStorage.getItem('tmua_last_name')||'';
  const saveRow=document.getElementById('save-row');
  if(score>0){saveRow.style.display='flex';nameInput.focus();}
  else saveRow.style.display='none';
}

function resetSession(){
  clearInterval(sessionInterval);sessionActive=false;accepting=false;paused=false;
  score=0;streak=0;best=0;totalAttempted=0;sessionTimeLeft=120;
  seenQuestions.clear();
  updateStats();updateSessionTimer();
  document.getElementById('question-text').textContent='Press start';
  document.getElementById('question-sub').textContent='Choose a mode and difficulty above';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('answer-input').value='';
  document.getElementById('answer-input').disabled=true;
  document.getElementById('answer-input').className='answer-input';
  document.getElementById('choices').innerHTML='';
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-bar').style.background='var(--blue)';
  document.getElementById('start-btn').textContent='Start';
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('main-area').style.display='block';
  document.getElementById('topic-badge').style.display='none';
  hideSolution();
}

const LB_KEY='tmua_leaderboard_v1';
let lastSavedId=null, savedThisSession=false, renderToken=0;

function remoteOn(){return SUPABASE_URL.trim()!==''&&SUPABASE_KEY.trim()!=='';}
function sbHeaders(){return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};}

function loadBoard(){
  try{return JSON.parse(localStorage.getItem(LB_KEY))||[];}catch(e){return [];}
}
function storeBoard(list){
  try{localStorage.setItem(LB_KEY,JSON.stringify(list));}catch(e){}
}

function paintRows(list){
  const ul=document.getElementById('lb-list');
  if(!list.length){
    ul.innerHTML='<div class="lb-empty">No scores yet — play a session to get on the board.</div>';
    return;
  }
  ul.innerHTML=list.map((e,i)=>{
    const rankClass=i<3?` top${i+1}`:'';
    const you=(e.id!=null&&e.id===lastSavedId)?' you':'';
    const name=(e.name||'Anon').replace(/</g,'&lt;');
    return `<li class="lb-row${rankClass}${you}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${name}<small>${e.acc}% · streak ${e.bestStreak}</small></span>
      <span class="lb-score">${e.score}</span>
    </li>`;
  }).join('');
}

async function renderLeaderboard(){
  const modeLabel=mode==='arithmetic'?'Arithmetic':'TMUA / ESAT';
  document.getElementById('lb-filter').textContent=`${modeLabel} · ${diff.charAt(0).toUpperCase()+diff.slice(1)}`+(remoteOn()?' · global':' · this device');
  document.getElementById('lb-clear').style.display=remoteOn()?'none':'inline';
  if(!remoteOn()){
    const list=loadBoard()
      .filter(e=>e.mode===mode&&e.diff===diff)
      .sort((a,b)=>b.score-a.score||b.bestStreak-a.bestStreak||a.t-b.t)
      .slice(0,10);
    paintRows(list);
    return;
  }
  const token=++renderToken;
  document.getElementById('lb-list').innerHTML='<div class="lb-empty">Loading scores…</div>';
  try{
    const url=`${SUPABASE_URL}/rest/v1/scores?select=*&mode=eq.${mode}&diff=eq.${diff}&order=score.desc,best_streak.desc,created_at.asc&limit=10`;
    const res=await fetch(url,{headers:sbHeaders()});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const rows=await res.json();
    if(token!==renderToken)return; // a newer request superseded this one
    paintRows(rows.map(r=>({id:r.id,name:r.name,score:r.score,acc:r.acc,bestStreak:r.best_streak})));
  }catch(err){
    if(token!==renderToken)return;
    document.getElementById('lb-list').innerHTML='<div class="lb-empty">Couldn\'t load the online leaderboard. Check your connection, then <button class="lb-clear" onclick="renderLeaderboard()">retry</button>.</div>';
  }
}

async function saveScore(){
  if(savedThisSession)return;
  const input=document.getElementById('name-input');
  const name=(input.value.trim()||'Anon').slice(0,14);
  const acc=totalAttempted>0?Math.round((score/totalAttempted)*100):0;
  const saveBtn=document.getElementById('save-btn');
  try{localStorage.setItem('tmua_last_name',name);}catch(e){}

  if(remoteOn()){
    saveBtn.disabled=true;saveBtn.textContent='Saving…';
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/scores`,{
        method:'POST',
        headers:{...sbHeaders(),'Prefer':'return=representation'},
        body:JSON.stringify({name,score,acc,best_streak:best,mode,diff})
      });
      if(!res.ok)throw new Error('HTTP '+res.status);
      const rows=await res.json();
      lastSavedId=(rows&&rows[0])?rows[0].id:null;
      savedThisSession=true;
      saveBtn.textContent='Saved ✓';input.disabled=true;
      renderLeaderboard();
    }catch(err){
      saveBtn.disabled=false;saveBtn.textContent='Retry save';
      alert('Could not save your score online. Check your connection and try again.');
    }
    return;
  }

  // local fallback
  const id='e'+(loadBoard().length)+'-'+score+'-'+name.length;
  const list=loadBoard();
  list.push({id,name,score,acc,bestStreak:best,mode,diff,t:list.length});
  storeBoard(list);
  lastSavedId=id;savedThisSession=true;
  saveBtn.textContent='Saved ✓';saveBtn.disabled=true;input.disabled=true;
  renderLeaderboard();
}

function clearLeaderboard(){
  if(remoteOn())return; // the shared board can't be wiped from a visitor's browser
  if(!confirm('Clear all leaderboard scores on this device? This cannot be undone.'))return;
  storeBoard([]);lastSavedId=null;renderLeaderboard();
}
document.addEventListener('DOMContentLoaded',()=>{
  renderLeaderboard();
  document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!savedThisSession)saveScore();});
});
