<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMUA Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #1a1a1f; --surface2: #222228;
    --border: #2e2e38; --text: #f0f0f0; --muted: #888; --hint: #555;
    --blue: #4f8ef7; --green: #3ecf7a; --amber: #f5a623; --red: #e84c4c;
    --radius: 10px; --radius-lg: 16px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 520px; margin-bottom: 1rem; }
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .mode-tab { flex: 1; padding: 9px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .mode-tab.active { background: var(--surface2); color: var(--text); border-color: #444; font-weight: 500; }
  .diff-row { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .diff-btn { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .diff-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(79,142,247,0.08); font-weight: 500; }
  .session-timer-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .session-timer-label { font-size: 12px; color: var(--muted); }
  .session-timer-value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .session-timer-value.warning { color: var(--amber); }
  .session-timer-value.danger { color: var(--red); }
  .timer-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .timer-bar { height: 100%; border-radius: 2px; transition: width 0.1s linear, background 0.3s; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface2); border-radius: var(--radius); padding: 10px 8px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .question-area { background: var(--surface2); border-radius: var(--radius-lg); padding: 2rem 1.5rem; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 1rem; border: 1px solid var(--border); }
  .question-text { font-size: 20px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.45; margin-bottom: 6px; }
  .question-sub { font-size: 12px; color: var(--hint); text-align: center; margin-top: 4px; }
  .answer-input { width: 100%; font-size: 24px; text-align: center; padding: 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: inherit; margin-bottom: 0.75rem; outline: none; transition: border-color 0.15s; }
  .answer-input:focus { border-color: var(--blue); }
  .answer-input:disabled { opacity: 0.4; }
  .answer-input.correct { border-color: var(--green); background: rgba(62,207,122,0.06); }
  .answer-input.wrong { border-color: var(--red); background: rgba(232,76,76,0.06); }
  .solution-panel { background: var(--surface2); border: 1px solid var(--red); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; display: none; }
  .solution-panel.visible { display: block; }
  .solution-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .solution-steps { list-style: none; }
  .solution-steps li { font-size: 14px; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); line-height: 1.5; }
  .solution-steps li:last-child { border-bottom: none; }
  .solution-steps li span { color: var(--muted); font-size: 12px; margin-right: 8px; }
  .solution-answer { font-size: 15px; font-weight: 600; color: var(--green); margin-top: 0.75rem; }
  .feedback { text-align: center; font-size: 14px; min-height: 20px; margin-bottom: 1rem; font-weight: 500; }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }
  .controls-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: var(--surface2); color: var(--text); border-color: #444; }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 500; }
  .btn-primary:hover { background: #3a7de0; border-color: #3a7de0; color: #fff; }
  .btn-next { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 600; display: none; }
  .btn-next:hover { background: #e09520; border-color: #e09520; color: #000; }
  .btn-next.visible { display: flex; align-items: center; justify-content: center; }
  .end-screen { text-align: center; padding: 1rem 0; display: none; }
  .end-screen.visible { display: block; }
  .end-score { font-size: 56px; font-weight: 700; color: var(--blue); }
  .end-label { font-size: 14px; color: var(--muted); margin-bottom: 0.5rem; }
  .end-detail { font-size: 13px; color: var(--hint); margin-bottom: 1.5rem; }
  .topic-badge { display: inline-block; font-size: 10px; color: var(--blue); background: rgba(79,142,247,0.12); border: 1px solid rgba(79,142,247,0.2); border-radius: 6px; padding: 2px 8px; margin-top: 8px; letter-spacing: 0.4px; text-transform: uppercase; }
</style>
</head>
<body>
<header>
  <h1>TMUA Trainer</h1>
  <p>120 seconds тАФ answer as many as you can</p>
</header>
<div class="card">
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('arithmetic')">Arithmetic</button>
    <button class="mode-tab" onclick="setMode('tmua')">TMUA / ESAT</button>
  </div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn" onclick="setDiff('hard')">Hard</button>
  </div>
  <div class="session-timer-wrap">
    <span class="session-timer-label">Time remaining</span>
    <span class="session-timer-value" id="session-timer">2:00</span>
  </div>
  <div class="timer-wrap"><div class="timer-bar" id="timer-bar" style="width:100%;background:var(--blue)"></div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streak">0</div></div>
    <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="best">0</div></div>
  </div>
  <div id="main-area">
    <div class="question-area">
      <div class="question-text" id="question-text">Press start</div>
      <div class="question-sub" id="question-sub">Choose a mode and difficulty above</div>
      <div class="topic-badge" id="topic-badge" style="display:none"></div>
    </div>
    <input class="answer-input" type="number" id="answer-input" placeholder="Type your answer..." oninput="handleInput()" disabled />
    <div class="feedback" id="feedback"></div>
    <div class="solution-panel" id="solution-panel">
      <div class="solution-title">Solution</div>
      <ul class="solution-steps" id="solution-steps"></ul>
      <div class="solution-answer" id="solution-answer"></div>
    </div>
    <div class="controls-row">
      <button class="btn btn-primary" onclick="startSession()" id="start-btn">Start</button>
      <button class="btn btn-next" id="next-btn" onclick="resumeSession()">Next тЖТ</button>
      <button class="btn" onclick="resetSession()">Reset</button>
    </div>
  </div>
  <div class="end-screen" id="end-screen">
    <div class="end-score" id="end-score">0</div>
    <div class="end-label">correct in 120 seconds</div>
    <div class="end-detail" id="end-detail"></div>
    <div class="controls-row" style="justify-content:center">
      <button class="btn btn-primary" onclick="resetSession()" style="max-width:160px">Play again</button>
    </div>
  </div>
</div>
<script>
let mode='arithmetic', diff='easy';
let score=0, streak=0, best=0, totalAttempted=0;
let currentQ=null, sessionInterval=null;
let sessionTimeLeft=120, sessionActive=false, accepting=false, paused=false;

function setMode(m){mode=m;document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='arithmetic')||(i===1&&m==='tmua')));resetSession();}
function setDiff(d){diff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===d));if(sessionActive&&!paused)nextQuestion();}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}
function nCr(n,r){if(r>n||r<0)return 0;if(r===0||r===n)return 1;r=Math.min(r,n-r);let v=1;for(let i=0;i<r;i++){v*=(n-i);v/=(i+1);}return Math.round(v);}
function sign(x){return x>=0?'+':'-';}
function abs(x){return Math.abs(x);}

// тФАтФА ARITHMETIC тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function generateArithmetic(){
  let q,a,steps;
  if(diff==='easy'){
    const t=rand(0,3);
    if(t===0){let x=rand(2,50),y=rand(2,50);q=`${x} + ${y}`;a=x+y;steps=[`${x} + ${y} = ${a}`];}
    else if(t===1){let x=rand(10,99),y=rand(1,x);q=`${x} тИТ ${y}`;a=x-y;steps=[`${x} тИТ ${y} = ${a}`];}
    else if(t===2){let x=rand(2,12),y=rand(2,12);q=`${x} ├Ч ${y}`;a=x*y;steps=[`${x} ├Ч ${y} = ${a}`];}
    else{let y=rand(2,12),x=y*rand(2,12);q=`${x} ├╖ ${y}`;a=x/y;steps=[`${x} ├╖ ${y} = ${a}`];}
  } else if(diff==='medium'){
    const t=rand(0,3);
    if(t===0){let x=rand(50,500),y=rand(50,500);q=`${x} + ${y}`;a=x+y;steps=[`Hundreds: ${Math.floor(x/100)*100}+${Math.floor(y/100)*100}`,`Tens/units: ${x%100}+${y%100}`,`= ${a}`];}
    else if(t===1){let x=rand(100,999),y=rand(10,x);q=`${x} тИТ ${y}`;a=x-y;steps=[`= ${a}`];}
    else if(t===2){let x=rand(12,25),y=rand(12,25);q=`${x} ├Ч ${y}`;a=x*y;let p=Math.floor(y/10)*10;steps=[`${x}├Ч${p}=${x*p}`,`${x}├Ч${y-p}=${x*(y-p)}`,`Sum = ${a}`];}
    else{let y=rand(3,15),x=y*rand(3,20);q=`${x} ├╖ ${y}`;a=x/y;steps=[`${y}├Ч${a}=${x}`,`Answer: ${a}`];}
  } else {
    const t=rand(0,4);
    if(t===0){let x=rand(100,999),y=rand(100,999);q=`${x} + ${y}`;a=x+y;steps=[`= ${a}`];}
    else if(t===1){let x=rand(200,999),y=rand(100,x-1);q=`${x} тИТ ${y}`;a=x-y;steps=[`= ${a}`];}
    else if(t===2){let x=rand(15,50),y=rand(15,50);q=`${x} ├Ч ${y}`;a=x*y;let p=Math.floor(y/10)*10;steps=[`${x}├Ч${p}=${x*p}`,`${x}├Ч${y-p}=${x*(y-p)}`,`Sum: ${a}`];}
    else if(t===3){let p=rand(2,9),r=rand(2,9);q=`${p*p*r} ├╖ ${p}`;a=p*r;steps=[`${p*p*r}=${p}┬▓├Ч${r}`,`├╖${p} тЖТ ${a}`];}
    else{let x=rand(10,50);q=`${x}┬▓`;a=x*x;steps=[`${x}├Ч${x}=${a}`];}
  }
  return{q,a,steps,sub:'',topic:'Arithmetic'};
}

// тФАтФА TMUA GENERATORS (spec-compliant) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

// MM1: Algebra тАФ indices, surds, quadratics, polynomials
function genIndices(){
  const t=rand(0,3);
  if(t===0){
    // Laws of indices: x^a * x^b = x^(a+b)
    const base=pick([2,3,5]);
    const a=rand(2,5),b=rand(2,5);
    const ans=Math.pow(base,a+b);
    return{q:`${base}^${a} ├Ч ${base}^${b} = ?`,a:ans,sub:'As a number',topic:'Indices',
      steps:[`Same base: add exponents`,`${base}^(${a}+${b}) = ${base}^${a+b}`,`= ${ans}`]};
  } else if(t===1){
    // x^a ├╖ x^b
    const base=pick([2,3]);
    const a=rand(4,8),b=rand(1,a-1);
    const ans=Math.pow(base,a-b);
    return{q:`${base}^${a} ├╖ ${base}^${b} = ?`,a:ans,sub:'As a number',topic:'Indices',
      steps:[`Subtract exponents: ${base}^(${a}тИТ${b})`,`= ${base}^${a-b} = ${ans}`]};
  } else if(t===2){
    // (x^a)^b
    const base=pick([2,3]);
    const a=rand(2,4),b=rand(2,3);
    const ans=Math.pow(base,a*b);
    return{q:`(${base}^${a})^${b} = ?`,a:ans,sub:'As a number',topic:'Indices',
      steps:[`Multiply exponents: ${base}^(${a}├Ч${b})`,`= ${base}^${a*b} = ${ans}`]};
  } else {
    // Negative/fractional: x^(1/2), x^(-1)
    const squares=[4,9,16,25,36,49,64,81,100];
    const x=pick(squares);
    return{q:`${x}^(1/2) = ?`,a:Math.sqrt(x),sub:'',topic:'Indices',
      steps:[`x^(1/2) = тИЪx`,`тИЪ${x} = ${Math.sqrt(x)}`]};
  }
}

function genQuadratics(){
  const t=rand(0,4);
  if(t===0){
    // Discriminant b┬▓-4ac
    const r1=rand(-5,5),r2=rand(-5,5);
    const B=-(r1+r2),C=r1*r2;
    const disc=B*B-4*C;
    const Bs=(B>=0?'+':'')+B, Cs=(C>=0?'+':'')+C;
    return{q:`Discriminant of x┬▓${Bs}x${Cs}=0?`,a:disc,sub:'b┬▓тИТ4ac',topic:'Quadratics',
      steps:[`b=${B}, a=1, c=${C}`,`╬Ф = ${B}┬▓тИТ4(1)(${C}) = ${B*B}тИТ${4*C}`,`= ${disc}`]};
  } else if(t===1){
    // Sum of roots = -b/a
    const r1=rand(-6,6),r2=rand(-6,6);
    const B=-(r1+r2),C=r1*r2;
    const Bs=(B>=0?'+':'')+B, Cs=(C>=0?'+':'')+C;
    return{q:`Sum of roots of x┬▓${Bs}x${Cs}=0?`,a:r1+r2,sub:'Factor theorem / Vieta',topic:'Quadratics',
      steps:[`Sum of roots = тИТb/a = тИТ(${B})`,`= ${r1+r2}`]};
  } else if(t===2){
    // Product of roots = c/a
    const r1=rand(-5,5),r2=rand(-5,5);
    const B=-(r1+r2),C=r1*r2;
    const Bs=(B>=0?'+':'')+B, Cs=(C>=0?'+':'')+C;
    return{q:`Product of roots of x┬▓${Bs}x${Cs}=0?`,a:r1*r2,sub:'Factor theorem / Vieta',topic:'Quadratics',
      steps:[`Product of roots = c/a = ${C}/1`,`= ${r1*r2}`]};
  } else if(t===3){
    // Completing the square: min/max value
    const a=rand(1,3),h=rand(-4,4),k=rand(-5,5);
    // f(x) = a(x+h)┬▓ + k тЖТ min value is k (if a>0)
    return{q:`Minimum of ${a}(x${h>=0?'+':''}${h})┬▓${k>=0?'+':''}${k}?`,a:k,sub:'Completed square form',topic:'Quadratics',
      steps:[`Form a(xтИТp)┬▓+q has min q when a>0`,`Min value = ${k}`]};
  } else {
    // Evaluate polynomial using factor theorem
    const a=rand(1,3),b=rand(-5,5),c=rand(-6,6),x0=pick([-3,-2,-1,1,2,3]);
    const ans=a*x0*x0+b*x0+c;
    const Bs=(b>=0?'+':'')+b,Cs=(c>=0?'+':'')+c;
    return{q:`f(${x0}) for f(x)=${a}x┬▓${Bs}x${Cs}?`,a:ans,sub:'Evaluate',topic:'Algebra',
      steps:[`f(${x0})=${a}(${x0})┬▓${b>=0?'+':''}${b}(${x0})${c>=0?'+':''}${c}`,`=${a*x0*x0}${b*x0>=0?'+':(b*x0<0?'':'')}${b*x0}${c>=0?'+':''}${c}`,`=${ans}`]};
  }
}

function genPolynomials(){
  const t=rand(0,2);
  if(t===0){
    // Remainder theorem: f(a) gives remainder when divided by (x-a)
    const a=rand(1,3),b=rand(-4,4),c=rand(-6,6),r=pick([-2,-1,1,2,3]);
    const rem=a*r*r+b*r+c;
    const Bs=(b>=0?'+':'')+b,Cs=(c>=0?'+':'')+c;
    return{q:`Remainder when ${a}x┬▓${Bs}x${Cs} is divided by (xтИТ${r})?`,a:rem,sub:'Remainder theorem',topic:'Polynomials',
      steps:[`By Remainder Theorem: substitute x=${r}`,`f(${r}) = ${a}(${r})┬▓${b>=0?'+':''}${b}(${r})${c>=0?'+':''}${c}`,`= ${a*r*r}${b*r>=0?'+':''}${b*r}${c>=0?'+':''}${c} = ${rem}`]};
  } else if(t===1){
    // Factor theorem: is (x-a) a factor?
    const roots=pick([[-1,2],[-2,3],[1,-3],[-1,-2],[2,3]]);
    const [r1,r2]=roots;
    const B=-(r1+r2),C=r1*r2;
    const testRoot=pick([r1,r2,r1+1]);
    const isF=(testRoot===r1||testRoot===r2)?1:0;
    const Bs=(B>=0?'+':'')+B,Cs=(C>=0?'+':'')+C;
    return{q:`Is (xтИТ${testRoot}) a factor of x┬▓${Bs}x${Cs}? (1=yes, 0=no)`,a:isF,sub:'Factor theorem',topic:'Polynomials',
      steps:[`Substitute x=${testRoot}: f(${testRoot}) = ${testRoot*testRoot+B*testRoot+C}`,`f(${testRoot})${isF?'=0, so yes':'тЙа0, so no'}`,`Answer: ${isF}`]};
  } else {
    // Algebraic division: find quotient coefficient
    // (x┬▓ + bx + c) ├╖ (x - r), find coefficient of x in quotient
    const r=pick([-3,-2,-1,1,2,3]);
    const q_coeff=rand(1,4); // quotient is x + q_coeff
    const B=q_coeff-r, C=-r*q_coeff;
    const Bs=(B>=0?'+':'')+B,Cs=(C>=0?'+':'')+C;
    return{q:`Coefficient of x when x┬▓${Bs}x${Cs} divided by (xтИТ${r})?`,a:q_coeff,sub:'Polynomial division',topic:'Polynomials',
      steps:[`x┬▓${Bs}x${Cs} = (xтИТ${r})(x+?)`,`Expand (xтИТ${r})(x+${q_coeff}): x┬▓+${q_coeff}xтИТ${r}xтИТ${r*q_coeff}`,`= x┬▓+${B}x+${C} тЬУ, coefficient = ${q_coeff}`]};
  }
}

// MM2: Sequences and series
function genSequences(){
  const t=rand(0,3);
  if(t===0){
    // AP nth term
    const a=rand(1,8),d=rand(1,7),n=rand(8,20);
    const ans=a+(n-1)*d;
    return{q:`${n}th term of AP: ${a}, ${a+d}, ${a+2*d},...?`,a:ans,sub:'Arithmetic progression',topic:'Sequences',
      steps:[`aтВЩ = a+(nтИТ1)d`,`= ${a}+(${n}тИТ1)├Ч${d}`,`= ${a}+${(n-1)*d} = ${ans}`]};
  } else if(t===1){
    // Sum of AP: Sn = n/2(2a+(n-1)d)
    const a=rand(1,5),d=rand(1,5),n=rand(5,15);
    const ans=n*(2*a+(n-1)*d)/2;
    return{q:`Sum of first ${n} terms: AP a=${a}, d=${d}?`,a:ans,sub:'Sum of AP',topic:'Sequences',

// MM6: Differentiation
function genDiff(){
  const t=rand(0,3);
  if(t===0){
    // d/dx(x^n) = nx^(n-1), evaluate at a point
    const n=rand(2,5),x0=pick([-2,-1,1,2,3]);
    const coeff=rand(1,4);
    const ans=coeff*n*Math.pow(x0,n-1);
    return{q:`f(x)=${coeff}x^${n}. f'(${x0})=?`,a:ans,sub:'Differentiate then evaluate',topic:'Differentiation',
      steps:[`f'(x) = ${coeff*n}x^${n-1}`,`f'(${x0}) = ${coeff*n}├Ч${x0}^${n-1}`,`= ${coeff*n}├Ч${Math.pow(x0,n-1)} = ${ans}`]};
  } else if(t===1){
    // Find stationary point x-coord: f'(x)=0
    const a=rand(1,3),h=rand(-4,4);
    // f(x)=a(x-h)┬▓ + k тЖТ f'(x)=2a(x-h)=0 тЖТ x=h
    const k=rand(-5,5);
    const B=-2*a*h,C=a*h*h+k;
    const Bs=(B>=0?'+':'')+B,Cs=(C>=0?'+':'')+C;
    return{q:`x-coordinate of stationary point of ${a}x┬▓${Bs}x${Cs}?`,a:h,sub:'Set f\'(x)=0',topic:'Differentiation',
      steps:[`f'(x) = ${2*a}x${B>=0?'+':''}${B}`,`Set to 0: x = тИТ(${B})/${2*a}`,`x = ${h}`]};
  } else if(t===2){
    // Gradient at a point
    const n=rand(2,4),coeff=rand(1,3),x0=pick([1,2,3,-1,-2]);
    const ans=coeff*n*Math.pow(x0,n-1);
    return{q:`Gradient of y=${coeff}x^${n} at x=${x0}?`,a:ans,sub:'dy/dx at point',topic:'Differentiation',
      steps:[`dy/dx = ${coeff*n}x^${n-1}`,`At x=${x0}: ${coeff*n}├Ч${x0}^${n-1} = ${ans}`]};
  } else {
    // Second derivative
    const n=rand(3,5),coeff=rand(1,3);
    const ans_coeff=coeff*n*(n-1);
    const power=n-2;
    return{q:`f(x)=${coeff}x^${n}. f''(x) at x=1?`,a:ans_coeff,sub:'Second derivative',topic:'Differentiation',
      steps:[`f'(x) = ${coeff*n}x^${n-1}`,`f''(x) = ${ans_coeff}x^${power}`,`f''(1) = ${ans_coeff}`]};
  }
}

  }
}

    // Compound interest (single period)
    const P=pick([100,200,500,1000]),r=pick([5,10,20,25]),n=rand(1,3);
    const ans=P*Math.pow(1+r/100,n);
    if(!Number.isInteger(ans))return genNumber();
    return{q:`┬г${P} invested at ${r}% pa for ${n} year${n>1?'s':''}. Amount?`,a:ans,sub:'Compound interest',topic:'Number',
      steps:[`A = P(1+r/100)^n`,`= ${P}├Ч(1+${r}/100)^${n}`,`= ${P}├Ч${(1+r/100)**n} = ${ans}`]};
  }
}

function factorStr(n){
  const f={};let d=2,m=n;
  while(d*d<=m){while(m%d===0){f[d]=(f[d]||0)+1;m=Math.floor(m/d);}d++;}
  if(m>1)f[m]=(f[m]||0)+1;
  return Object.entries(f).map(([p,e])=>e>1?`${p}^${e}`:p).join('├Ч');
}

// Polygon geometry
function genPolygonGeometry(){
  const t=rand(0,2);
  if(t===0){
    // Interior angle sum
    const ns=[4,5,6,7,8,9,10,12];
    const n=pick(ns);
    const ans=(n-2)*180;
    return{q:`Sum of interior angles of a ${n}-gon?`,a:ans,sub:'In degrees',topic:'Geometry',
      steps:[`Formula: (nтИТ2)├Ч180┬░`,(n-2>0?`= ${n-2}├Ч180┬░`:`= 0`),`= ${ans}┬░`]};
  } else if(t===1){
    // Interior angle of regular polygon
    const ns=[5,6,7,8,9,10,12];
    const n=pick(ns);
    const ans=(n-2)*180/n;
    if(!Number.isInteger(ans))return genPolygonGeometry();
    return{q:`Interior angle of regular ${n}-gon?`,a:ans,sub:'In degrees',topic:'Geometry',
      steps:[`(nтИТ2)├Ч180/n`,`= ${n-2}├Ч180/${n}`,`= ${ans}┬░`]};
  } else {
    // Number of diagonals
    const ns=[4,5,6,7,8,10];
    const n=pick(ns);
    const ans=n*(n-3)/2;
    return{q:`Diagonals of a ${n}-gon?`,a:ans,sub:'',topic:'Geometry',
      steps:[`n(nтИТ3)/2`,`= ${n}├Ч${n-3}/2`,`= ${ans}`]};
  }
}

// Probability (spec: conditional, tree, Venn тАФ simple combinations)
function genProbability(){
  const t=rand(0,3);
  if(t===0){
    // P(AтИкB) = P(A)+P(B)-P(AтИйB)
    const opts=[
      {pa:0.4,pb:0.5,pab:0.2,ans:0.7},
      {pa:0.3,pb:0.6,pab:0.1,ans:0.8},
      {pa:0.5,pb:0.4,pab:0.3,ans:0.6},
      {pa:0.6,pb:0.3,pab:0.2,ans:0.7},
    ];
    const o=pick(opts);
    return{q:`P(A)=${o.pa}, P(B)=${o.pb}, P(AтИйB)=${o.pab}. P(AтИкB)?`,a:o.ans,sub:'Probability',topic:'Probability',
      steps:[`P(AтИкB)=P(A)+P(B)тИТP(AтИйB)`,`=${o.pa}+${o.pb}тИТ${o.pab}`,`=${o.ans}`]};
  } else if(t===1){
    // Conditional P(B|A)=P(AтИйB)/P(A)
    const denoms=[4,5,10,20];
    const denom=pick(denoms);
    const both=rand(1,Math.floor(denom/2));
    const countA=rand(both+1,Math.min(denom-1,both*3));
    const ans=parseFloat((both/countA).toFixed(2));
    return{q:`P(B|A)? P(AтИйB)=${both}/${denom}, P(A)=${countA}/${denom}`,a:ans,sub:'Conditional probability (2 d.p.)',topic:'Probability',
      steps:[`P(B|A) = P(AтИйB)/P(A)`,`= (${both}/${denom})/(${countA}/${denom})`,`= ${both}/${countA} тЙИ ${ans}`]};
  } else if(t===2){
    // Mutually exclusive: P(A)+P(B)
    const pa=pick([0.1,0.2,0.25,0.3,0.35]);
    const pb=pick([0.1,0.15,0.2,0.25,0.3]);
    const ans=parseFloat((pa+pb).toFixed(2));
    return{q:`A,B mutually exclusive. P(A)=${pa}, P(B)=${pb}. P(A or B)?`,a:ans,sub:'Mutually exclusive',topic:'Probability',
      steps:[`Mutually exclusive тЖТ P(A or B)=P(A)+P(B)`,`=${pa}+${pb}=${ans}`]};
  } else {
    // Tree diagram тАФ two independent events
    const p1=pick([0.5,0.25,0.4,0.3,0.6]);
    const p2=pick([0.5,0.25,0.4,0.3,0.6]);
    const ans=parseFloat((p1*p2).toFixed(4));
    return{q:`P(A)=${p1}, P(B)=${p2}, independent. P(A and B)?`,a:ans,sub:'Independent events (4 d.p.)',topic:'Probability',
      steps:[`Independent: P(AтИйB)=P(A)├ЧP(B)`,`=${p1}├Ч${p2}`,`=${ans}`]};
  }
}

// TMUA dispatcher
function generateTMUA(){
  let gens;
  if(diff==='easy'){
    gens=[genIndices,genQuadratics,genSequences,genBinomial,genLogs,genTrigExact,genPythagoras,genNumber,genPolygonGeometry,genProbability,genCoordGeom];
  } else if(diff==='medium'){
    gens=[genIndices,genQuadratics,genPolynomials,genSequences,genBinomial,genCoordGeom,genCircleGeom,genLogs,genTrigExact,genTrigSolve,genRadians,genPythagoras,genDiff,genIntegration,genNumber,genPolygonGeometry,genProbability,genTransformations];
  } else {
    // Hard: full spec, harder parameters, all generators
    gens=[genIndices,genQuadratics,genPolynomials,genSequences,genBinomial,genCoordGeom,genCircleGeom,genLogs,genTrigExact,genTrigSolve,genRadians,genPythagoras,genDiff,genIntegration,genNumber,genPolygonGeometry,genProbability,genTransformations];
  }
  for(let i=0;i<10;i++){
    try{
      const q=pick(gens)();
      if(q&&q.a!==undefined&&!isNaN(q.a))return q;
    }catch(e){}
  }
  return{q:'2┬│ ├Ч 2тБ┤ = ?',a:128,sub:'',topic:'Indices',steps:['2^(3+4)=2^7=128']};
}

// тФАтФА SESSION LOGIC тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function handleInput(){
  if(!accepting||!currentQ)return;
  const val=parseFloat(document.getElementById('answer-input').value);
  if(isNaN(val))return;
  if(Math.abs(val-currentQ.a)<0.015){
    accepting=false;score++;streak++;totalAttempted++;
    if(streak>best)best=streak;
    const inp=document.getElementById('answer-input');
    inp.classList.add('correct');inp.disabled=true;
    showFeedback(true,streak>=3?`Correct! ${streak} in a row ЁЯФе`:'Correct!');
    updateStats();setTimeout(nextQuestion,600);
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('answer-input').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&sessionActive&&!paused&&accepting){
      const val=parseFloat(this.value);
      if(!isNaN(val)&&Math.abs(val-currentQ.a)>=0.015)showWrong();
    }
  });
});

function nextQuestion(){
  accepting=false;hideSolution();
  document.getElementById('next-btn').classList.remove('visible');
  const inp=document.getElementById('answer-input');
  inp.value='';inp.disabled=false;inp.className='answer-input';inp.focus();
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  currentQ=mode==='arithmetic'?generateArithmetic():generateTMUA();
  document.getElementById('question-text').textContent=currentQ.q;
  document.getElementById('question-sub').textContent=currentQ.sub||'';
  const badge=document.getElementById('topic-badge');
  if(mode==='tmua'&&currentQ.topic){badge.textContent=currentQ.topic;badge.style.display='inline-block';}
  else badge.style.display='none';
  accepting=true;
}

function showWrong(){
  accepting=false;paused=true;clearInterval(sessionInterval);
  totalAttempted++;streak=0;updateStats();
  const inp=document.getElementById('answer-input');
  inp.classList.add('wrong');inp.disabled=true;
  showFeedback(false,'Wrong тАФ timer paused. Study the solution, then continue.');
  showSolution(currentQ);
  document.getElementById('next-btn').classList.add('visible');
}

function resumeSession(){paused=false;document.getElementById('next-btn').classList.remove('visible');nextQuestion();startTimer();}

function showSolution(q){
  const panel=document.getElementById('solution-panel');
  const steps=document.getElementById('solution-steps');
  const ans=document.getElementById('solution-answer');
  steps.innerHTML='';
  (q.steps||[]).forEach((s,i)=>{const li=document.createElement('li');li.innerHTML=`<span>${i+1}.</span>${s}`;steps.appendChild(li);});
  ans.textContent=`Answer: ${q.a}`;
  panel.classList.add('visible');
}

function hideSolution(){document.getElementById('solution-panel').classList.remove('visible');}
function showFeedback(ok,msg){const el=document.getElementById('feedback');el.textContent=msg;el.className='feedback '+(ok?'correct':'wrong');}
function updateStats(){document.getElementById('score').textContent=score;document.getElementById('streak').textContent=streak;document.getElementById('best').textContent=best;}
function formatTime(s){const m=Math.floor(s/60);const sec=Math.ceil(s%60);return`${m}:${sec.toString().padStart(2,'0')}`;}

function updateSessionTimer(){
  const el=document.getElementById('session-timer');
  el.textContent=formatTime(sessionTimeLeft);
  el.className='session-timer-value'+(sessionTimeLeft<=10?' danger':sessionTimeLeft<=30?' warning':'');
  const bar=document.getElementById('timer-bar');
  const pct=(sessionTimeLeft/120)*100;
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'var(--blue)':pct>20?'var(--amber)':'var(--red)';
}

function startTimer(){
  clearInterval(sessionInterval);
  sessionInterval=setInterval(()=>{sessionTimeLeft-=0.1;updateSessionTimer();if(sessionTimeLeft<=0){clearInterval(sessionInterval);endSession();}},100);
}

function startSession(){
  sessionActive=true;paused=false;score=0;streak=0;totalAttempted=0;sessionTimeLeft=120;
  updateStats();updateSessionTimer();
  document.getElementById('start-btn').textContent='Restart';
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('main-area').style.display='block';
  hideSolution();document.getElementById('next-btn').classList.remove('visible');
  nextQuestion();startTimer();
}

function endSession(){
  sessionActive=false;accepting=false;clearInterval(sessionInterval);
  document.getElementById('answer-input').disabled=true;
  document.getElementById('main-area').style.display='none';
  document.getElementById('end-screen').classList.add('visible');
  document.getElementById('end-score').textContent=score;
  const acc=totalAttempted>0?Math.round((score/totalAttempted)*100):0;
  document.getElementById('end-detail').textContent=`${totalAttempted} attempted ┬╖ ${acc}% accuracy ┬╖ best streak: ${best}`;
}

function resetSession(){
  clearInterval(sessionInterval);sessionActive=false;accepting=false;paused=false;
  score=0;streak=0;best=0;totalAttempted=0;sessionTimeLeft=120;
  updateStats();updateSessionTimer();
  document.getElementById('question-text').textContent='Press start';
  document.getElementById('question-sub').textContent='Choose a mode and difficulty above';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('answer-input').value='';
  document.getElementById('answer-input').disabled=true;
  document.getElementById('answer-input').className='answer-input';
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-bar').style.background='var(--blue)';
  document.getElementById('start-btn').textContent='Start';
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('main-area').style.display='block';
  document.getElementById('topic-badge').style.display='none';
  hideSolution();
}
